version: "1.0"

# [经济设置]
economy:
  buy-price: 10   # 永久购买价格
  rent-price: 5   # 租赁单日价格

# [权限白名单系统]
whitelist:
  # 一级白名单：核心推送/更新权限 (一行一个)
  # 示范:
  # primary:
  #   - TechAdmin
  primary: []

  # 二级白名单：管理员/发放权限 (逗号分隔)
  # 示范: secondary: "Admin1,Admin2"
  secondary: ""

# [系统设置]
update-settings:
  max-failures: 5
expiry-notify-days: 3 # 源码已锁死 1-7 天